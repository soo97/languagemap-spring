spring.application.name=map-spring

spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT 설정
# 실제 값은 환경변수 JWT_SECRET에서 가져온다.
# HS256 서명용이므로 최소 32자 이상으로 설정하는 것을 권장한다.
jwt.secret=mySecretKeyForJWTTokenGenerationMapingo

# Access Token 만료 시간
# 3600000ms = 1시간
jwt.access-token-expiration=3600000

# Redis 설정
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Refresh Token 만료 시간
# 604800000ms = 7일
jwt.refresh-token-expiration=604800000