spring.application.name=map-spring

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 铆聟聦矛聤陇铆聤赂 毛聛聺毛聜聵锚鲁聽毛聤聰 update毛隆聹 毛鲁聙锚虏陆
spring.jpa.hibernate.ddl-auto=create

# data.sql 铆聲颅矛聝聛 矛聥陇铆聳聣
spring.sql.init.mode=always

# JPA 铆聟聦矛聺麓毛赂聰 矛聝聺矛聞卤 铆聸聞 data.sql 矛聥陇铆聳聣毛聬聵毛聫聞毛隆聺 矛聢聹矛聞聹 毛鲁麓矛聻楼
spring.jpa.defer-datasource-initialization=true

spring.jpa.show-sql=true

# JWT 矛聞陇矛聽聲
# 矛聥陇矛聽聹 锚掳聮矛聺聙 铆聶聵锚虏陆毛鲁聙矛聢聵 JWT_SECRET矛聴聬矛聞聹 锚掳聙矛聽赂矛聵篓毛聥陇.
# HS256 矛聞聹毛陋聟矛職漏矛聺麓毛炉聙毛隆聹 矛碌聹矛聠聦 32矛聻聬 矛聺麓矛聝聛矛聹录毛隆聹 矛聞陇矛聽聲铆聲聵毛聤聰 锚虏聝矛聺聞 锚露聦矛聻楼铆聲聹毛聥陇.
jwt.secret=${JWT_SECRET}

# Access Token 毛搂聦毛拢聦 矛聥聹锚掳聞
# 3600000ms = 1矛聥聹锚掳聞
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:3600000}

# Redis 矛聞陇矛聽聲
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Refresh Token 毛搂聦毛拢聦 矛聥聹锚掳聞
# 604800000ms = 7矛聺录
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# Google OAuth
# 矛聥陇矛聽聹 锚掳聮矛聺聙 铆聶聵锚虏陆毛鲁聙矛聢聵矛聴聬矛聞聹 锚掳聙矛聽赂矛聵篓毛聥陇.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# OAuth 毛隆聹锚路赂矛聺赂 矛聞卤锚鲁碌/矛聥陇铆聦篓 铆聸聞 铆聰聞毛隆聽铆聤赂 redirect 矛拢录矛聠聦
oauth.google.success-redirect-url=${OAUTH_GOOGLE_SUCCESS_REDIRECT_URL:http://localhost:5173/oauth/success}
oauth.google.failure-redirect-url=${OAUTH_GOOGLE_FAILURE_REDIRECT_URL:http://localhost:5173/oauth/failure}


# Auth Cookie
# 搿滌滑 臧滊皽頇橁步 旮办 靹れ爼
auth.cookie.refresh-token-name=refreshToken
auth.cookie.path=/
auth.cookie.domain=
auth.cookie.http-only=true
auth.cookie.secure=false
auth.cookie.same-site=Lax