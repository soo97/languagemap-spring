spring.application.name=map-spring

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT 矛聞陇矛聽聲
# 矛聥陇矛聽聹 锚掳聮矛聺聙 铆聶聵锚虏陆毛鲁聙矛聢聵 JWT_SECRET矛聴聬矛聞聹 锚掳聙矛聽赂矛聵篓毛聥陇.
# HS256 矛聞聹毛陋聟矛職漏矛聺麓毛炉聙毛隆聹 矛碌聹矛聠聦 32矛聻聬 矛聺麓矛聝聛矛聹录毛隆聹 矛聞陇矛聽聲铆聲聵毛聤聰 锚虏聝矛聺聞 锚露聦矛聻楼铆聲聹毛聥陇.
jwt.secret=${JWT_SECRET}

# Access Token 毛搂聦毛拢聦 矛聥聹锚掳聞
# 3600000ms = 1矛聥聹锚掳聞
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:3600000}

# Redis 矛聞陇矛聽聲
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Refresh Token 毛搂聦毛拢聦 矛聥聹锚掳聞
# 604800000ms = 7矛聺录
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# FastAPI 靹れ爼
fastapi.base-url=${FASTAPI_BASE_URL:http://localhost:8000}